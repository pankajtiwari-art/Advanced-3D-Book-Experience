<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Book Experience</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="book-container" id="book">
            <div class="page" id="left-under"></div>
            <div class="page" id="right-under"></div>
            
            <div class="page front-page" id="left-front"></div>
            <div class="page front-page" id="right-front"></div>
            
            <div class="flap" id="flap">
                <div class="flap-content" id="flapContent"></div>
                <div class="fold-gradient" id="foldGradient"></div>
            </div>
        </div>

        <div class="controls">
            <button id="prevBtn">◄ Prev</button>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <button id="nextBtn">Next ►</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
